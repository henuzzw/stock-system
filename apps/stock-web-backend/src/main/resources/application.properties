spring.application.name=stock-web-backend
server.port=8088

spring.datasource.url=jdbc:mysql://127.0.0.1:3310/stock_pipeline?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=flowing
spring.datasource.password=flowing
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=ai.openclaw.stockweb
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-statement-timeout=30
mybatis.configuration.default-fetch-size=100

# Keep the MySQL pool intentionally small because stock-pipeline shares the same DB.
# Also make idle/abandoned behavior visible instead of silently accumulating sockets.
spring.datasource.hikari.pool-name=stockWebHikari
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.leak-detection-threshold=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.register-mbeans=true

auth.jwt.secret=${AUTH_JWT_SECRET:change-me-dev-jwt-secret}
auth.jwt.ttl-seconds=${AUTH_JWT_TTL_SECONDS:86400}

# Jackson config (keep default for Spring Boot 4)
